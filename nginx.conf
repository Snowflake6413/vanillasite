server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip text assets
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Serve clean URLs: /blog -> /blog/index.html, /page -> /page.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Long cache for fingerprint-free static assets
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Don't cache HTML so content updates show up immediately
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
}
