---
layout: layout.html
title: alex's blog!
eleventyExcludeFromCollections: true
---
<h1>Blog Posts</h1>

<ul class="blog-list">
  {% for post in collections.posts reversed %}
    <li>
      <span class="post-date">{{ post.date | date: "%b %d, %Y" }}</span>
      <a href="{{ post.url }}">{{ post.data.title }}</a>
    </li>
  {% else %}
    <li>No posts found. Check back later!</li>
  {% endfor %}
</ul>
